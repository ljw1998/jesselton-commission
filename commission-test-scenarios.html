<body>
<div class="container">
    <div class="header">
        <h1>Jesselton Property — Commission Test Scenarios</h1>
        <p>20 scenarios · Groups A–E · Covers all override, ISP, termination &amp; project commission branches</p>
    </div>
    <div class="content">
        <div id="scenarios"></div>
    </div>
</div>

<script>
// =====================================================================
//  COMMISSION ENGINE
// =====================================================================

const ISP_TABLE = {
    100: [0.0030, 0.0028, 0.0025, 0.0023, 0.0021, 0.0019, 0.0017, 0.0015, 0.0012, 0.0010],
    200: [0.0050, 0.0048, 0.0044, 0.0039, 0.0033, 0.0027, 0.0021, 0.0015, 0.0013, 0.0010],
    300: [0.0070, 0.0065, 0.0060, 0.0050, 0.0040, 0.0035, 0.0030, 0.0020, 0.0015, 0.0015],
    400: [0.0100, 0.0090, 0.0080, 0.0065, 0.0050, 0.0035, 0.0025, 0.0020, 0.0020, 0.0015]
};

function getSubsidyRate(renCount) {
    if (renCount >= 400) return 0.00;
    if (renCount >= 300) return 0.01;
    if (renCount >= 200) return 0.02;
    if (renCount >= 100) return 0.03;
    return 0;
}

function getISPRates(renCount) {
    if (renCount >= 400) return ISP_TABLE[400];
    if (renCount >= 300) return ISP_TABLE[300];
    if (renCount >= 200) return ISP_TABLE[200];
    if (renCount >= 100) return ISP_TABLE[100];
    return null; // < 100 REN: ISP not active
}

class Agent {
    constructor(id, name, rank, parentId = null, active = true) {
        this.id = id;
        this.name = name;
        this.rank = rank; // 'SAPPHIRE' | 'RUBY' | 'BD' | 'BD_UNLOCKED'
        this.parentId = parentId;
        this.active = active;
    }
    getBaseRate() {
        switch (this.rank) {
            case 'SAPPHIRE': return 0.70;
            case 'RUBY':     return 0.80;
            case 'BD':       return 0.87;
            case 'BD_UNLOCKED': return 0.87;
            default: return 0;
        }
    }
}

function buildUplineChain(agents, sellerId) {
    const seller = agents.find(a => a.id === sellerId);
    const chain = [];
    let cur = seller.parentId;
    while (cur) {
        const p = agents.find(a => a.id === cur);
        if (!p) break;
        chain.push(p);
        cur = p.parentId;
    }
    return chain;
}

/**
 * Calculate Jesselton commission for a regular (non-project) transaction.
 * forcedSubsidyRate: if set, overrides the company-size subsidy lookup.
 *   Used for Group A scenarios that test override logic in isolation.
 */
function calculateCommission(agents, sellerId, grossCommission, renCount, forcedSubsidyRate) {
    const subsidyRate = (forcedSubsidyRate != null) ? forcedSubsidyRate : getSubsidyRate(renCount);
    const ispRates = getISPRates(renCount);

    const seller = agents.find(a => a.id === sellerId);
    const uplineChain = buildUplineChain(agents, sellerId);

    // Personal
    let sellerEffRate = seller.getBaseRate();
    if (seller.rank === 'BD_UNLOCKED') sellerEffRate = 0.87 + subsidyRate;
    const personalCommission = sellerEffRate * grossCommission;

    // Overrides — walk upline chain, track highest rank rate seen
    let prevHighRate = sellerEffRate;
    const overrides = [];

    for (const upline of uplineChain) {
        if (!upline.active) {
            overrides.push({ upline, amount: 0, bdAmount: 0, subsidyAmount: 0, skipped: true });
            continue;
        }
        if (upline.rank === 'BD_UNLOCKED') {
            const effRate = 0.87 + subsidyRate;
            if (effRate > prevHighRate) {
                const bdPortion = Math.max(0, 0.87 - prevHighRate);
                const bdAmt  = bdPortion * grossCommission;
                const subAmt = subsidyRate * grossCommission;
                overrides.push({ upline, amount: bdAmt + subAmt, bdAmount: bdAmt, subsidyAmount: subAmt, skipped: false });
                prevHighRate = effRate;
            } else {
                overrides.push({ upline, amount: 0, bdAmount: 0, subsidyAmount: 0, skipped: false });
            }
        } else {
            const upRate = upline.getBaseRate();
            if (upRate > prevHighRate) {
                const amt = (upRate - prevHighRate) * grossCommission;
                overrides.push({ upline, amount: amt, bdAmount: amt, subsidyAmount: 0, skipped: false });
                prevHighRate = upRate;
            } else {
                overrides.push({ upline, amount: 0, bdAmount: 0, subsidyAmount: 0, skipped: false });
            }
        }
    }

    // ISP — inactive uplines re-indexed out; active uplines fill Gen1..GenN
    const activeUplines = uplineChain.filter(u => u.active);
    const ispPayments = [];
    if (ispRates) {
        for (let i = 0; i < 10; i++) {
            const rate = ispRates[i];
            const amt  = rate * grossCommission;
            if (i < activeUplines.length) {
                ispPayments.push({ upline: activeUplines[i], gen: i + 1, rate, amount: amt, absorbed: false });
            } else {
                ispPayments.push({ upline: null, gen: i + 1, rate, amount: amt, absorbed: true });
            }
        }
    }

    const totalOverrides = overrides.reduce((s, o) => s + o.amount, 0);
    const totalISPPaid   = ispPayments.filter(p => !p.absorbed).reduce((s, p) => s + p.amount, 0);
    const companyAmount  = grossCommission - personalCommission - totalOverrides - totalISPPaid;

    return {
        seller, grossCommission, renCount, subsidyRate,
        sellerEffRate, personalCommission,
        overrides, ispPayments,
        totalOverrides, totalISPPaid, companyAmount
    };
}

// =====================================================================
//  HELPERS
// =====================================================================
function rm(v) {
    return 'RM\u202f' + v.toLocaleString('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function pct(r) { return (r * 100).toFixed(2).replace(/\.?0+$/, '') + '%'; }
function near(a, b) { return Math.abs(a - b) < 0.015; }
function tick(ok) { return ok ? '<span class="match">✓</span>' : '<span class="mismatch">✗</span>'; }

// =====================================================================
//  SCENARIO DEFINITIONS
// =====================================================================
const SCENARIO_GROUPS = [

// ─────────────────────────────────────────────────────────────────────
// GROUP A: Basic Override, No ISP
// forcedSubsidyRate = 0.03 for scenarios with BD_UNLOCKED so they work
// at renCount=50 (no ISP). Isolates override logic.
// ─────────────────────────────────────────────────────────────────────
{
    id: 'A',
    title: 'Group A: Basic Override — No ISP (< 100 REN)',
    scenarios: [
    {
        id: 'S1', name: 'S1: Sapphire Isolated Sale',
        desc: 'Sapphire seller, no uplines, 50 REN',
        keyTest: 'Baseline: 70% personal, zero overrides, zero ISP, company = 30%',
        commission: 10000, renCount: 50, forcedSubsidyRate: null,
        buildAgents: () => {
            const s = new Agent('seller', 'Sapphire Agent', 'SAPPHIRE', null, true);
            return { agents: [s], sellerId: 'seller' };
        },
        expected: { personal: 7000, overrides: {}, ispPaid: 0, company: 3000 }
    },
    {
        id: 'S2', name: 'S2: Sapphire → Ruby (Direct Upline)',
        desc: 'Sapphire sells, Ruby is Gen1 upline, 50 REN',
        keyTest: 'Gap override: Ruby receives (80−70)% = 10% = RM1,000',
        commission: 10000, renCount: 50, forcedSubsidyRate: null,
        buildAgents: () => {
            const ruby = new Agent('ruby', 'Ruby Upline', 'RUBY', null, true);
            const s    = new Agent('seller', 'Sapphire Agent', 'SAPPHIRE', 'ruby', true);
            return { agents: [ruby, s], sellerId: 'seller' };
        },
        expected: { personal: 7000, overrides: { ruby: 1000 }, ispPaid: 0, company: 2000 }
    },
    {
        id: 'S3', name: 'S3: Sapphire → BD (Direct Upline)',
        desc: 'Sapphire sells, BD is Gen1 upline, 50 REN',
        keyTest: 'BD receives full gap (87−70)% = 17% = RM1,700',
        commission: 10000, renCount: 50, forcedSubsidyRate: null,
        buildAgents: () => {
            const bd = new Agent('bd', 'BD Upline', 'BD', null, true);
            const s  = new Agent('seller', 'Sapphire Agent', 'SAPPHIRE', 'bd', true);
            return { agents: [bd, s], sellerId: 'seller' };
        },
        expected: { personal: 7000, overrides: { bd: 1700 }, ispPaid: 0, company: 1300 }
    },
    {
        id: 'S4', name: 'S4: Sapphire → Sapphire → BD (Skip Same Rank)',
        desc: 'Gen1 upline is also Sapphire (same rank = skipped), Gen2 = BD, 50 REN',
        keyTest: 'Same-rank upline receives RM0 override; BD still gets full 17% gap',
        commission: 10000, renCount: 50, forcedSubsidyRate: null,
        buildAgents: () => {
            const bd   = new Agent('bd', 'BD Upline', 'BD', null, true);
            const sap2 = new Agent('sap2', 'Sapphire Mid', 'SAPPHIRE', 'bd', true);
            const s    = new Agent('seller', 'Sapphire Agent', 'SAPPHIRE', 'sap2', true);
            return { agents: [bd, sap2, s], sellerId: 'seller' };
        },
        expected: { personal: 7000, overrides: { sap2: 0, bd: 1700 }, ispPaid: 0, company: 1300 }
    },
    {
        id: 'S5', name: 'S5: Sapphire → BD → BD Unlocked (3% Subsidy)',
        desc: 'Full 3-rank chain; BD Unlocked only receives subsidy (BD already took gap)',
        keyTest: 'BD Unlocked receives only 3% subsidy = RM300; BD portion already claimed by BD',
        commission: 10000, renCount: 50, forcedSubsidyRate: 0.03,
        buildAgents: () => {
            const bdu = new Agent('bdu', 'BD Unlocked', 'BD_UNLOCKED', null, true);
            const bd  = new Agent('bd', 'BD Agent', 'BD', 'bdu', true);
            const s   = new Agent('seller', 'Sapphire Agent', 'SAPPHIRE', 'bd', true);
            return { agents: [bdu, bd, s], sellerId: 'seller' };
        },
        expected: { personal: 7000, overrides: { bd: 1700, bdu: 300 }, ispPaid: 0, company: 1000 }
    },
    {
        id: 'S6', name: 'S6: Ruby → BD Unlocked (BD Portion + Subsidy)',
        desc: 'Ruby seller, direct upline is BD Unlocked — BD portion + subsidy tracked separately',
        keyTest: 'BD Unlocked gets RM700 BD portion + RM300 subsidy = RM1,000 total',
        commission: 10000, renCount: 50, forcedSubsidyRate: 0.03,
        buildAgents: () => {
            const bdu = new Agent('bdu', 'BD Unlocked', 'BD_UNLOCKED', null, true);
            const s   = new Agent('seller', 'Ruby Agent', 'RUBY', 'bdu', true);
            return { agents: [bdu, s], sellerId: 'seller' };
        },
        expected: {
            personal: 8000,
            overrides: { bdu: { bd: 700, subsidy: 300, total: 1000 } },
            ispPaid: 0, company: 1000
        }
    },
    {
        id: 'S7', name: 'S7: BD → BD Unlocked (Subsidy Only)',
        desc: 'BD sells, direct upline is BD Unlocked — only subsidy flows up',
        keyTest: 'BD Unlocked receives 3% subsidy only = RM300; no BD portion (seller already at 87%)',
        commission: 10000, renCount: 50, forcedSubsidyRate: 0.03,
        buildAgents: () => {
            const bdu = new Agent('bdu', 'BD Unlocked', 'BD_UNLOCKED', null, true);
            const s   = new Agent('seller', 'BD Agent', 'BD', 'bdu', true);
            return { agents: [bdu, s], sellerId: 'seller' };
        },
        expected: {
            personal: 8700,
            overrides: { bdu: { bd: 0, subsidy: 300, total: 300 } },
            ispPaid: 0, company: 1000
        }
    },
    {
        id: 'S8', name: 'S8: BD Unlocked Sells (Lower-Rank Upline)',
        desc: 'BD Unlocked (90%) sells; upline is Sapphire — no override flows up to lower rank',
        keyTest: 'No override flows upward to lower-rank upline; company keeps the rest',
        commission: 10000, renCount: 50, forcedSubsidyRate: 0.03,
        buildAgents: () => {
            const sap = new Agent('sap', 'Sapphire Upline', 'SAPPHIRE', null, true);
            const s   = new Agent('seller', 'BD Unlocked', 'BD_UNLOCKED', 'sap', true);
            return { agents: [sap, s], sellerId: 'seller' };
        },
        expected: { personal: 9000, overrides: { sap: 0 }, ispPaid: 0, company: 1000 }
    },
    {
        id: 'S9', name: 'S9: Full Cascade — Sapphire → Ruby → BD → BD Unlocked',
        desc: 'All 4 ranks in chain; each layer receives exactly its gap/subsidy slice',
        keyTest: 'Ruby 10% + BD 7% + BD Unlocked 3% subsidy = 20% total overrides',
        commission: 10000, renCount: 50, forcedSubsidyRate: 0.03,
        buildAgents: () => {
            const bdu  = new Agent('bdu', 'BD Unlocked', 'BD_UNLOCKED', null, true);
            const bd   = new Agent('bd', 'BD Agent', 'BD', 'bdu', true);
            const ruby = new Agent('ruby', 'Ruby Agent', 'RUBY', 'bd', true);
            const s    = new Agent('seller', 'Sapphire Agent', 'SAPPHIRE', 'ruby', true);
            return { agents: [bdu, bd, ruby, s], sellerId: 'seller' };
        },
        expected: { personal: 7000, overrides: { ruby: 1000, bd: 700, bdu: 300 }, ispPaid: 0, company: 1000 }
    }
    ]
},

// ─────────────────────────────────────────────────────────────────────
// GROUP B: ISP Distribution Only (Sapphire seller, same-rank uplines)
// ─────────────────────────────────────────────────────────────────────
{
    id: 'B',
    title: 'Group B: ISP Distribution Only (Sapphire seller, same-rank uplines)',
    note: `
        <p>The ISP is paid up to <strong>10 generations</strong> of uplines.</p>
        <p><strong>Important Rule:</strong> If a sales line does not have 10 layers of uplines, the remaining/unclaimed percentages for the missing generations will be <strong>absorbed by the company</strong>.</p>
        <table>
            <tr><th>Generation</th><th>2.00% Pool<br>(100 REN)</th><th>3.00% Pool<br>(200 REN)</th><th>4.00% Pool<br>(300 REN)</th><th>5.00% Pool<br>(400 REN)</th></tr>
            <tr><td>Gen 1 (Direct)</td><td>0.30%</td><td>0.50%</td><td>0.70%</td><td>1.00%</td></tr>
            <tr><td>Gen 2</td><td>0.28%</td><td>0.48%</td><td>0.65%</td><td>0.90%</td></tr>
            <tr><td>Gen 3</td><td>0.25%</td><td>0.44%</td><td>0.60%</td><td>0.80%</td></tr>
            <tr><td>Gen 4</td><td>0.23%</td><td>0.39%</td><td>0.50%</td><td>0.65%</td></tr>

// =====================================================================
//  RENDER ENGINE
// =====================================================================

function rankClass(rank) {
    if (!rank) return '';
    return rank.toLowerCase().replace('_', '_');
}

function rankLabel(rank, subsidyRate) {
    switch (rank) {
        case 'SAPPHIRE': return 'Sapphire (70%)';
        case 'RUBY':     return 'Ruby (80%)';
        case 'BD':       return 'BD (87%)';
        case 'BD_UNLOCKED':
            const effPct = (87 + subsidyRate * 100).toFixed(0);
            return `BD Unlocked (${effPct}%)`;
        default: return rank;
    }
}

function renderChain(agents, sellerId, subsidyRate, scenario) {
    const seller = agents.find(a => a.id === sellerId);
    const chain  = buildUplineChain(agents, sellerId);

    // Build ordered list: top uplines first, seller last
    const ordered = [...chain].reverse(); // top of chain first
    ordered.push(seller);

    // For S11-S13 (10-gen chains) collapse middle
    const MAX_SHOW = 5;
    let showNodes = ordered;
    let collapsed = false;
    if (ordered.length > MAX_SHOW + 2) {
        showNodes = [...ordered.slice(0, 3), null, ordered[ordered.length - 1]];
        collapsed = true;
    }

    let html = '<div class="chain">';
    showNodes.forEach((agent, idx) => {
        if (agent === null) {
            html += `<div class="chain-more">··· ${ordered.length - 4} more ···</div>`;
            html += '<div class="chain-arrow">↓</div>';
            return;
        }
        const isSeller = agent.id === sellerId;
        const cls = rankClass(agent.rank) + (isSeller ? ' seller-ring' : '') + (!agent.active ? ' inactive' : '');
        const effRate = agent.rank === 'BD_UNLOCKED' ? (0.87 + subsidyRate) : agent.getBaseRate();
        html += `<div class="chain-node ${cls}">`;
        html += `<div class="node-name">${agent.name}</div>`;
        html += `<div class="node-rank">${agent.rank.replace('_', ' ')}</div>`;
        html += `<div class="node-rate">${pct(effRate)}</div>`;
        if (isSeller) html += `<div class="node-seller-label">SELLER</div>`;
        if (!agent.active) html += `<div class="node-inactive-label">INACTIVE</div>`;
        html += '</div>';
        if (idx < showNodes.length - 1 && showNodes[idx + 1] !== null) {
            html += '<div class="chain-arrow">↓</div>';
        } else if (showNodes[idx + 1] === null) {
            html += '<div class="chain-arrow">↓</div>';
        }
    });
    html += '</div>';
    return html;
}

function renderCalcTable(result, expected, scenario) {
    let rows = '';
    let allPass = true;

    function addRow(label, expVal, actVal, cls = '', extraCls = '') {
        const ok = near(actVal, expVal);
        if (!ok) allPass = false;
        return `<tr class="${extraCls}"><td>${label}</td><td>${rm(expVal)}</td><td>${tick(ok)}</td></tr>`;
    }

    // Personal
    rows += addRow(`Personal (${pct(result.sellerEffRate)} × gross)`, expected.personal, result.personalCommission);

    // Overrides
    result.overrides.forEach(o => {
        if (o.skipped) {
            rows += `<tr class="skipped-row"><td>Override → ${o.upline.name} <em>(inactive, skipped)</em></td><td class="dim">—</td><td class="dim">–</td></tr>`;
            return;
        }
        const expEntry = expected.overrides[o.upline.id];
        if (expEntry === undefined) return;

        if (o.upline.rank === 'BD_UNLOCKED' && typeof expEntry === 'object' && expEntry !== null && 'total' in expEntry) {
            // Split row for BD_UNLOCKED
            const okBD  = near(o.bdAmount, expEntry.bd);
            const okSub = near(o.subsidyAmount, expEntry.subsidy);
            const okTot = near(o.amount, expEntry.total);
            if (!okBD || !okSub || !okTot) allPass = false;
            rows += `<tr><td>Override → ${o.upline.name} <small>(BD gap portion)</small> (${pct(o.bdAmount / result.grossCommission)})</td><td>${rm(expEntry.bd)}</td><td>${tick(okBD)}</td></tr>`;
            rows += `<tr><td>Override → ${o.upline.name} <small>(Subsidy portion)</small> (${pct(o.subsidyAmount / result.grossCommission)})</td><td>${rm(expEntry.subsidy)}</td><td>${tick(okSub)}</td></tr>`;
            rows += `<tr class="subtotal-row"><td>&nbsp;&nbsp;BD Unlocked total (${pct(o.amount / result.grossCommission)} → ${rm(expEntry.total)})</td><td></td><td>${tick(okTot)}</td></tr>`;
        } else {
            const expAmt = typeof expEntry === 'number' ? expEntry : expEntry.total;
            const ok = near(o.amount, expAmt);
            if (!ok) allPass = false;
            rows += `<tr><td>Override → ${o.upline.name} (${pct(o.amount / result.grossCommission)})</td><td>${rm(expAmt)}</td><td>${tick(ok)}</td></tr>`;
        }
    });

    // ISP rows
    if (result.ispPayments.length > 0) {
        result.ispPayments.forEach(p => {
            if (p.absorbed) {
                rows += `<tr class="absorbed-row"><td>ISP Gen${p.gen} (${pct(p.rate)}) — absorbed by company</td><td class="dim">${rm(p.amount)}</td><td class="dim">–</td></tr>`;
            } else {
                // Check against ispDetail if provided
                let expAmt = null;
                if (expected.ispDetail) {
                    const det = expected.ispDetail.find(d => d.gen === p.gen);
                    if (det) expAmt = det.amount;
                }
                if (expAmt !== null) {
                    const ok = near(p.amount, expAmt);
                    if (!ok) allPass = false;
                    rows += `<tr><td>ISP Gen${p.gen} → ${p.upline.name} (${pct(p.rate)})</td><td>${rm(expAmt)}</td><td>${tick(ok)}</td></tr>`;
                } else {
                    rows += `<tr><td>ISP Gen${p.gen} → ${p.upline.name} (${pct(p.rate)})</td><td>—</td><td class="dim">–</td></tr>`;
                }
            }
        });
        // ISP total paid
        const okISP = near(result.totalISPPaid, expected.ispPaid);
        if (!okISP) allPass = false;
        rows += `<tr class="subtotal-row"><td><strong>Total ISP Paid (${pct(result.totalISPPaid / result.grossCommission)})</strong></td><td>${rm(expected.ispPaid)}</td><td>${tick(okISP)}</td></tr>`;
    } else {
        const okISP = near(0, expected.ispPaid);
        if (!okISP) allPass = false;
        rows += `<tr><td>ISP (0%) — not active at ${result.renCount} REN</td><td>${rm(expected.ispPaid)}</td><td>${tick(okISP)}</td></tr>`;
    }

    // Company
    const okCo = near(result.companyAmount, expected.company);
    if (!okCo) allPass = false;
    rows += `<tr class="company-row"><td><strong>Company Retention (${pct(result.companyAmount / result.grossCommission)})</strong></td><td>${rm(expected.company)}</td><td>${tick(okCo)}</td></tr>`;

    const html = `
        <div class="calc-section">
            <h3>Calculation Breakdown &nbsp;|&nbsp; Gross: ${rm(result.grossCommission)} &nbsp;|&nbsp; REN Count: ${result.renCount}</h3>
            <table class="calc-table">
                <thead><tr><th>Item</th><th>Expected</th><th>✓</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;
    return { html, allPass };
}

function renderProjectScenario(scenario) {
    const alloc       = scenario.allocation;
    const renCount    = scenario.renCount;
    const { agents, sellers, pl, pic } = scenario.buildAgents();
    const personalPool = 0.75 * alloc;
    const plPool       = 0.10 * alloc;
    const picPool      = 0.10 * alloc;
    const companyBase  = 0.05 * alloc;
    let allPass = true;

    // Compute per-seller results
    const sellerResults = sellers.map(s => ({
        meta: s,
        result: calculateCommission(agents, s.id, s.poolShare * personalPool, renCount, scenario.forcedSubsidyRate || null)
    }));

    // ── TABLE 1: Project Allocation ──────────────────────────────────
    let t1rows = '';
    // Seller pool
    t1rows += `<tr><td><strong>Seller Personal Pool</strong></td><td>75%</td><td>${rm(personalPool)}</td></tr>`;
    if (sellers.length > 1) {
        sellers.forEach((s, i) => {
            const agent = agents.find(a => a.id === s.id);
            t1rows += `<tr class="subtotal-row"><td>&nbsp;&nbsp;${agent.name} (${(s.poolShare * 100).toFixed(0)}% of pool)</td><td>${pct(s.poolShare * 0.75)}</td><td>${rm(s.poolShare * personalPool)}</td></tr>`;
        });
    }
    // PL rows
    pl.forEach(p => {
        const amt = p.share * plPool;
        const label = pl.length > 1 ? `Project Leader — ${p.name} (${pct(p.share)} of PL pool)` : `Project Leader — ${p.name}`;
        t1rows += `<tr><td>${label}</td><td>${pct(p.share * 0.10)}</td><td>${rm(amt)}</td></tr>`;
    });
    // PIC rows
    pic.forEach(p => {
        const amt = p.share * picPool;
        const label = pic.length > 1 ? `Project IC — ${p.name} (${pct(p.share)} of PIC pool)` : `Project IC — ${p.name}`;
        t1rows += `<tr><td>${label}</td><td>${pct(p.share * 0.10)}</td><td>${rm(amt)}</td></tr>`;
    });
    // Company base
    t1rows += `<tr class="company-row"><td><strong>Company Base</strong></td><td>5%</td><td>${rm(companyBase)}</td></tr>`;

    const t1html = `
        <div class="calc-section" style="margin-bottom:12px;">
            <h3>Table 1 — Project Allocation &nbsp;|&nbsp; Total: ${rm(alloc)} &nbsp;|&nbsp; REN: ${renCount}</h3>
            <table class="calc-table">
                <thead><tr><th>Role</th><th>%</th><th>Amount</th></tr></thead>
                <tbody>${t1rows}</tbody>
            </table>
        </div>`;

    // ── TABLE 2+: Per-seller breakdown ───────────────────────────────
    let sellerTablesHtml = '';
    sellerResults.forEach(({ meta, result }, idx) => {
        const exp   = scenario.expected.sellers[idx];
        const agent = agents.find(a => a.id === meta.id);
        let rows = '';

        // Gross comm header row
        rows += `<tr class="subtotal-row"><td><strong>Gross Commission (${pct(meta.poolShare * 0.75)} of allocation)</strong></td><td>${rm(result.grossCommission)}</td><td>–</td></tr>`;

        // Personal
        const okP = near(result.personalCommission, exp.personal);
        if (!okP) allPass = false;
        rows += `<tr><td>Personal (${pct(result.sellerEffRate)})</td><td>${rm(exp.personal)}</td><td>${tick(okP)}</td></tr>`;

        // Overrides
        result.overrides.forEach(o => {
            if (o.skipped) {
                rows += `<tr class="skipped-row"><td>Override → ${o.upline.name} (inactive, skipped)</td><td>—</td><td>–</td></tr>`;
                return;
            }
            const expEntry = exp.overrides[o.upline.id];
            if (expEntry === undefined) return;
            if (o.upline.rank === 'BD_UNLOCKED' && typeof expEntry === 'object' && 'total' in expEntry) {
                const okBD  = near(o.bdAmount, expEntry.bd);
                const okSub = near(o.subsidyAmount, expEntry.subsidy);
                const okTot = near(o.amount, expEntry.total);
                if (!okBD || !okSub || !okTot) allPass = false;
                rows += `<tr><td>Override → ${o.upline.name} (BD gap ${pct(o.bdAmount / result.grossCommission)})</td><td>${rm(expEntry.bd)}</td><td>${tick(okBD)}</td></tr>`;
                rows += `<tr><td>Override → ${o.upline.name} (Subsidy ${pct(o.subsidyAmount / result.grossCommission)})</td><td>${rm(expEntry.subsidy)}</td><td>${tick(okSub)}</td></tr>`;
                rows += `<tr class="subtotal-row"><td>&nbsp;&nbsp;BD Unlocked total (${pct(o.amount / result.grossCommission)} → ${rm(expEntry.total)})</td><td></td><td>${tick(okTot)}</td></tr>`;
            } else {
                const expAmt = typeof expEntry === 'number' ? expEntry : expEntry.total;
                const ok = near(o.amount, expAmt);
                if (!ok) allPass = false;
                rows += `<tr><td>Override → ${o.upline.name} (${pct(o.amount / result.grossCommission)})</td><td>${rm(expAmt)}</td><td>${tick(ok)}</td></tr>`;
            }
        });

        // ISP
        if (result.ispPayments.length > 0) {
            result.ispPayments.forEach(p => {
                if (p.absorbed) {
                    rows += `<tr class="absorbed-row"><td>ISP Gen${p.gen} (${pct(p.rate)}) — absorbed by company</td><td class="dim">${rm(p.amount)}</td><td class="dim">–</td></tr>`;
                } else {
                    let expAmt = null;
                    if (exp.ispDetail) {
                        const det = exp.ispDetail.find(d => d.gen === p.gen);
                        if (det) expAmt = det.amount;
                    }
                    if (expAmt !== null) {
                        const ok = near(p.amount, expAmt);
                        if (!ok) allPass = false;
                        rows += `<tr><td>ISP Gen${p.gen} → ${p.upline.name} (${pct(p.rate)})</td><td>${rm(expAmt)}</td><td>${tick(ok)}</td></tr>`;
                    } else {
                        rows += `<tr><td>ISP Gen${p.gen} → ${p.upline.name} (${pct(p.rate)})</td><td>—</td><td class="dim">–</td></tr>`;
                    }
                }
            });
            const okISP = near(result.totalISPPaid, exp.ispPaid);
            if (!okISP) allPass = false;
            rows += `<tr class="subtotal-row"><td><strong>Total ISP Paid (${pct(result.totalISPPaid / result.grossCommission)})</strong></td><td>${rm(exp.ispPaid)}</td><td>${tick(okISP)}</td></tr>`;
        } else {
            const okISP = near(0, exp.ispPaid);
            if (!okISP) allPass = false;
            rows += `<tr><td>ISP (0%) — not active at ${renCount} REN</td><td>${rm(exp.ispPaid)}</td><td>${tick(okISP)}</td></tr>`;
        }

        // Company from pool
        const okCo = near(result.companyAmount, exp.companyFromPool);
        if (!okCo) allPass = false;
        rows += `<tr class="company-row"><td><strong>Company from Pool (${pct(result.companyAmount / result.grossCommission)})</strong></td><td>${rm(exp.companyFromPool)}</td><td>${tick(okCo)}</td></tr>`;

        sellerTablesHtml += `
            <div class="calc-section" style="margin-bottom:12px;">
                <h3>Table ${idx + 2} — ${agent.name} Commission Breakdown &nbsp;|&nbsp; Gross: ${rm(result.grossCommission)}</h3>
                <table class="calc-table">
                    <thead><tr><th>Item</th><th>Expected</th><th>✓</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
    });

    // ── Total Company summary row ─────────────────────────────────────
    const actualTotalCompany = sellerResults.reduce((s, { result }) => s + result.companyAmount, 0) + companyBase;
    const okTotCo = near(actualTotalCompany, scenario.expected.totalCompany);
    if (!okTotCo) allPass = false;
    const totalCoHtml = `
        <div class="calc-section">
            <table class="calc-table">
                <tbody>
                    <tr class="company-row"><td><strong>Total Company Retention (${pct(actualTotalCompany / alloc)})</strong></td><td>${rm(scenario.expected.totalCompany)}</td><td>${tick(okTotCo)}</td></tr>
                </tbody>
            </table>
        </div>`;

    return { html: t1html + sellerTablesHtml + totalCoHtml, allPass };
}

// =====================================================================
//  MAIN RENDER
// =====================================================================
function renderAll() {
    let totalCount = 0, passCount = 0, failCount = 0;
    let scenariosHtml = '';

    SCENARIO_GROUPS.forEach(group => {
        scenariosHtml += `<div class="group-header">Group ${group.id}: ${group.title.replace(/^Group [A-E]: /, '')}</div>`;
        if (group.note) {
            scenariosHtml += `<div class="group-note">${group.note}</div>`;
        }

        group.scenarios.forEach(scenario => {
            totalCount++;
            let allPass, calcHtml, bodyHtml;

            if (scenario.projectCommission) {
                const calcResult = renderProjectScenario(scenario);
                calcHtml = calcResult.html;
                allPass  = calcResult.allPass;
                const { agents, sellers } = scenario.buildAgents();
                const subsidyRate = getSubsidyRate(scenario.renCount);
                let chainHtml = '';
                if (sellers.length > 1) {
                    chainHtml = '<div class="chain-multi">';
                    sellers.forEach(s => {
                        const agent = agents.find(a => a.id === s.id);
                        chainHtml += `<div class="chain-seller-col">
                            <div class="chain-seller-label">${agent.name}<br>(${(s.poolShare * 100).toFixed(0)}% of pool)</div>
                            ${renderChain(agents, s.id, subsidyRate, scenario)}
                        </div>`;
                    });
                    chainHtml += '</div>';
                } else {
                    chainHtml = renderChain(agents, sellers[0].id, subsidyRate, scenario);
                }
                const chainWidth = sellers.length > 1 ? 'flex: 0 0 380px' : '';
                bodyHtml = `<div class="side-by-side"><div class="chain-column" style="${chainWidth}">${chainHtml}</div><div class="calc-column">${calcHtml}</div></div>`;
            } else {
                const { agents, sellerId } = scenario.buildAgents();
                const result = calculateCommission(agents, sellerId, scenario.commission, scenario.renCount, scenario.forcedSubsidyRate);
                const calcResult = renderCalcTable(result, scenario.expected, scenario);
                calcHtml = calcResult.html;
                allPass  = calcResult.allPass;
                const chainHtml = renderChain(agents, sellerId, result.subsidyRate, scenario);
                bodyHtml = `<div class="side-by-side"><div class="chain-column">${chainHtml}</div><div class="calc-column">${calcHtml}</div></div>`;
            }

            if (allPass) passCount++; else failCount++;
            const statusCls = allPass ? 'passed' : 'failed';

            scenariosHtml += `
                <div class="test-scenario ${statusCls}">
                    <div class="scenario-header">
                        <div class="scenario-title-block">
                            <div class="scenario-title">${scenario.name}</div>
                            <div class="scenario-desc">${scenario.desc}</div>
                        </div>
                        <div class="status-badge ${statusCls}">${allPass ? '✓ PASS' : '✗ FAIL'}</div>
                    </div>
                    ${bodyHtml}
                    <div class="key-test"><strong>Key Test:</strong> ${scenario.keyTest}</div>
                </div>`;
        });
    });

    // Summary
    document.getElementById('scenarios').innerHTML = scenariosHtml;
}

renderAll();
</script>
